<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - Sistema Gasmar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .gasmar-navy { color: #17375F; }
        .bg-gasmar-navy { background-color: #17375F; }
        /* Cor de destaque baseada no seu projeto (Lima) */
        .border-gasmar-lime { border-color: #A2C516; }
        .text-gasmar-lime { color: #A2C516; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl border-t-8 border-gasmar-lime p-10 text-center transform transition-all hover:scale-105">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        
        <h1 class="text-3xl font-extrabold gasmar-navy mb-4 italic">Registro Salvo!</h1>
        <p class="text-slate-500 font-medium mb-8">
            Os dados da emissão fugitiva foram calculados e armazenados com sucesso no banco de dados da Gasmar.
        </p>

        <div class="space-y-3">
            <a href="/cadastro.html" class="block w-full bg-gasmar-navy text-white font-bold py-4 rounded-xl shadow-lg hover:bg-sky-700 transition-all uppercase tracking-tighter">
                Novo Registro
            </a>
            
            <a href="/" class="block w-full bg-slate-100 text-slate-600 font-bold py-4 rounded-xl hover:bg-slate-200 transition-all uppercase tracking-tighter">
                Ir para o Dashboard
            </a>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-100">
            <img src="{{ url_for('static', filename='logo_gasmar.png') }}" alt="Gasmar" class="h-10 mx-auto opacity-80 hover:opacity-100 transition-opacity">
        </div>
    </div>
</body>

</html>
